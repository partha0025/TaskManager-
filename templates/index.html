<!DOCTYPE html>
<html>
<head>
    <title>Task manager</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:600px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
        }

        input[type=text]{
            width:75%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            background:#eee;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
        }

        .completed{
            text-decoration:line-through;
            color:gray;
        }

        a{
            text-decoration:none;
            padding:6px 10px;
            border-radius:5px;
            color:white;
        }

        .update{
            background:orange;
        }

        .delete{
            background:red;
        }

        .logout{
            float:right;
            background:black;
            padding:8px 12px;
        }

    </style>

</head>
<body>

<div class="container">

<a href="{% url 'logout' %}" class="logout">Logout</a>

<h2>My ToDo List</h2>

<form method="POST" action="{% url 'add_task' %}">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Enter Task" required>

    <button type="submit">Add Task</button>

</form>

<hr>

<ul>

{% for task in tasks %}

<li>

<span class="{% if task.completed %}completed{% endif %}">
{{ task.title }}
</span>

<a class="update" href="{% url 'update_task' task.id %}">
{% if task.completed %}
Undo
{% else %}
Complete
{% endif %}
</a>

<a class="delete" href="{% url 'delete_task' task.id %}">
Delete
</a>

</li>

{% empty %}

<li>No Tasks Found.</li>

{% endfor %}

</ul>

</div>

</body>
</html>
